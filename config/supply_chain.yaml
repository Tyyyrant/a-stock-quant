# A股产业链映射配置
# 每个主题定义5层供应链拆解 + 瓶颈原型标注
#
# 五层模型:
#   L1: 下游对照 (终端品牌/应用运营商)
#   L2: 中游系统 (整机/系统集成商)
#   L3: 中游器件 (核心零部件/子系统)
#   L4: 上游设备 (制造装备/测试设备)
#   L5: 上游材料/代工 (原材料/代工服务)
#
# 瓶颈原型 (9+3):
#   1. 单源供应商    — 全球只有1-2家能做的
#   2. 产能瓶颈      — 扩产需要2年+的
#   3. 认证壁垒      — 客户认证周期>1年的
#   4. 耗材绑定      — 设备卖了后面持续耗材收入的
#   5. 设计锁定      — 产品设计一旦选定换不掉的
#   6. 高转换成本    — 客户切换成本极高的
#   7. 稀缺牌照      — 政府特许经营/牌照限制
#   8. 工艺壁垒      — 良率/工艺know-how极难复制的
#   9. 规模效应      — 规模越大成本越低的正循环
#   A1. 国产替代锁定  — 卡脖子环节的国内唯一/领先供应商 (A股特有)
#   A2. 政策壁垒      — 核电/军工/烟草等准入壁垒 (A股特有)
#   A3. 国企改革套利  — 央企整合/资产注入预期 (A股特有)

